[develop]
# A dedicated database, separate from [production]'s "pricing" - so local
# dev/test runs (few SKUs, trimmed via scripts/trim_dev_listings.py) never
# read or write the real production listings.
db_host = "localhost"
db_port = 5432
db_name = "pricing_dev"
db_user = "pricing"
log_level = "DEBUG"
headless = false
default_manufacturer = "NVIDIA"
default_gpus = ["rtx 5070", "rtx 5070 ti"]
default_stores = []
default_brands = []
scraper_timeout_seconds = 120
display_timezone = "America/Sao_Paulo"
default_cron_times = ["08:00", "12:00", "16:00", "20:00"]
navigation_timeout_ms = 30000
terabyte_navigation_timeout_ms = 45000
http_timeout_seconds = 30.0
stores_config_path = "data/target-stores-list.json"
target_urls_path = "data/target_urls.json"
log_file_path = "data/orchestrator.log"
backup_retention_count = 30
backup_cron_hour = 3
backup_cron_minute = 0
trigger_poll_interval_seconds = 5.0

